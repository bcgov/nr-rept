---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rept-frontend
  labels:
    app: rept-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rept-frontend
  template:
    metadata:
      labels:
        app: rept-frontend
    spec:
      containers:
        - name: rept-frontend
          # Updated by the CI pipeline via envsubst
          image: ${FRONTEND_IMAGE}
          ports:
            - name: http
              containerPort: 3000
            - name: health
              containerPort: 3001
          env:
            - name: LOG_LEVEL
              value: ${FRONTEND_LOG_LEVEL}
            - name: BACKEND_URL
              value: ${BACKEND_URL}
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: rept-frontend
spec:
  selector:
    app: rept-frontend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
---
# Route (OpenShift-specific ingress)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rept-frontend
spec:
  host: ${FRONTEND_HOST}
  to:
    kind: Service
    name: rept-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
