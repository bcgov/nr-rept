---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rept-frontend
  labels:
    app: rept-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rept-frontend
  template:
    metadata:
      labels:
        app: rept-frontend
    spec:
      containers:
        - name: rept-frontend
          # Updated by the CI pipeline via envsubst
          image: ${FRONTEND_IMAGE}
          ports:
            - name: http
              containerPort: 3000
            - name: health
              containerPort: 3001
          env:
            - name: LOG_LEVEL
              value: ${FRONTEND_LOG_LEVEL}
            - name: BACKEND_URL
              value: ${BACKEND_URL}
            # VITE_* values are injected into /srv/config.js by docker-entrypoint.sh
            # at container start, so a single image works for DEV/TEST/PROD.
            - name: VITE_USER_POOLS_ID
              value: ${VITE_USER_POOLS_ID}
            - name: VITE_USER_POOLS_WEB_CLIENT_ID
              value: ${VITE_USER_POOLS_WEB_CLIENT_ID}
            - name: VITE_REDIRECT_SIGN_OUT
              value: ${VITE_REDIRECT_SIGN_OUT}
            - name: VITE_BACKEND_URL
              value: ${VITE_BACKEND_URL}
            - name: VITE_APP_NAME
              value: ${VITE_APP_NAME}
            - name: VITE_ZONE
              value: ${VITE_ZONE}
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 3
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: rept-frontend
spec:
  selector:
    app: rept-frontend
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
---
# Route (OpenShift-specific ingress)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: rept-frontend
spec:
  host: ${FRONTEND_HOST}
  to:
    kind: Service
    name: rept-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
# NetworkPolicy: allow ingress from the OpenShift router into the frontend pods.
# BC Gov silver namespaces have default-deny ingress; without this the router
# returns 503 even though the Route is Admitted and the Service has endpoints.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-openshift-ingress-to-frontend
spec:
  podSelector:
    matchLabels:
      app: rept-frontend
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
  policyTypes:
    - Ingress
