name: Build & Deploy to OpenShift

on:
  push:
    branches: [main]

env:
  # ── Configure these in your repo's Settings → Secrets & Variables ──
  OPENSHIFT_URL:   ${{ secrets.OC_SERVER }}     # https://api.<cluster>:6443
  OC_TOKEN: ${{ secrets.OC_TOKEN }}   # service-account token with deploy rights
  OC_NAMESPACE:   ${{ secrets.OC_NAMESPACE }}     # target namespace / project
  DB_JDBC_CONNECT_STRING: ${{ secrets.DB_JDBC_CONNECT_STRING }}
  DB_USER: ${{ secrets.DB_USER }}
  DB_PWD: ${{ secrets.DB_PWD }}
  DB_HOST: ${{ secrets.DB_HOST }}
  KEYSTORE_SECRET: ${{ secrets.KEYSTORE_SECRET }}

  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_REGISTRY_USER: ${{ github.actor }}
  IMAGE_REGISTRY_PASSWORD: ${{ github.token }}

  IMAGE_TAG: latest
  APP_NAME: rept
  MIN_REPLICAS: 1
  MAX_REPLICAS: 2
  MIN_CPU: 300m
  MIN_MEM: 1G
  SPRING_SECURITY_LOG_LEVEL: INFO
  SPRING_WEB_LOG_LEVEL: INFO
  APP_LOG_LEVEL: INFO
  SPRING_BOOT_AUTOCONFIG_LOG_LEVEL: INFO
  SPRING_SHOW_REQUEST_DETAILS: false
  SPRING_JPA_SHOW_SQL: false
  TOKEN_ISSUER_URL: ${{ secrets.TOKEN_ISSUER_URL }}

jobs:
  # https://github.com/redhat-actions/buildah-build#readme
  build-and-push-backend:
    name: Build Backend Image & Push
    runs-on: ubuntu-24.04
    outputs:
      registry-path: ${{ steps.push-image-backend.outputs.registry-path }}
    steps:
      - uses: actions/checkout@v4
      - name: Build Backend from Dockerfile
        id: build-image-backend
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}-backend
          tags: ${{ env.IMAGE_TAG }}
          context: ./backend
          dockerfiles: |
            ./backend/Dockerfile

      - name: Push backend to GHCR
        id: push-image-backend
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image-backend.outputs.image }}
          tags: ${{ steps.build-image-backend.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}
  # ────────────────────────────────────────────────────────
  test-frontend:
    name: Lint & Test Frontend
    runs-on: ubuntu-24.04
    needs: build-and-push-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test:unit -- --run --passWithNoTests

  # ────────────────────────────────────────────────────────
  build-and-push-frontend:
    name: Build Frontend Image & Push
    runs-on: ubuntu-24.04
    needs: test-frontend
    # Only push on merges to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      registry-path: ${{ steps.push-image-frontend.outputs.registry-path }}

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend from Dockerfile
        id: build-image-frontend
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}-frontend
          tags: ${{ env.IMAGE_TAG }}
          context: ./frontend
          dockerfiles: |
            ./frontend/Dockerfile

      - name: Push frontend to GHCR
        id: push-image-frontend
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image-frontend.outputs.image }}
          tags: ${{ steps.build-image-frontend.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OpenShift
    runs-on: ubuntu-24.04
    needs: [build-and-push-frontend,build-and-push-backend]
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift
        run: |
          oc login "${{ env.OPENSHIFT_URL }}" \
            --token="${{ env.OC_TOKEN }}" \
            --insecure-skip-tls-verify=false
          oc project "${{ env.OC_NAMESPACE }}"

      - name: Tag backend image into OpenShift
        env:
          REGISTRY_PATH_BACKEND: ${{ needs.build-and-push-backend.outputs.registry-path }}
        run: |
          oc tag --source=docker $REGISTRY_PATH_BACKEND ${{ env.APP_NAME }}-backend:${{ env.IMAGE_TAG }} \
          --reference-policy=local

      - name: Substitute image in backend manifest
        run: |
          sed -i "s|<IMAGE_PLACEHOLDER>|image-registry.openshift-image-registry.svc:5000/${OC_NAMESPACE}/${APP_NAME}-backend:${IMAGE_TAG}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute MIN_REPLICAS in backend manifest
        run: |
          sed -i "s|<MIN_REPLICAS>|${MIN_REPLICAS}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute MAX_REPLICAS in backend manifest
        run: |
          sed -i "s|<MAX_REPLICAS>|${MAX_REPLICAS}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute DB_JDBC_CONNECT_STRING in backend manifest
        run: |
          sed -i "s|<DB_JDBC_CONNECT_STRING>|${DB_JDBC_CONNECT_STRING}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute DB_HOST in backend manifest
        run: |
          sed -i "s|<DB_HOST>|${DB_HOST}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute KEYSTORE_SECRET in backend manifest
        run: |
          sed -i "s|<KEYSTORE_SECRET>|${KEYSTORE_SECRET}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute DB_USER in backend manifest
        run: |
          sed -i "s|<DB_USER>|${DB_USER}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute DB_PWD in backend manifest
        run: |
          sed -i "s|<DB_PWD>|${DB_PWD}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute MIN_CPU in backend manifest
        run: |
          sed -i "s|<MIN_CPU>|${MIN_CPU}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute MIN_MEM in backend manifest
        run: |
          sed -i "s|<MIN_MEM>|${MIN_MEM}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute SPRING_SECURITY_LOG_LEVEL in backend manifest
        run: |
          sed -i "s|<SPRING_SECURITY_LOG_LEVEL>|${SPRING_SECURITY_LOG_LEVEL}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute SPRING_WEB_LOG_LEVEL in backend manifest
        run: |
          sed -i "s|<SPRING_WEB_LOG_LEVEL>|${SPRING_WEB_LOG_LEVEL}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute APP_LOG_LEVEL in backend manifest
        run: |
          sed -i "s|<APP_LOG_LEVEL>|${APP_LOG_LEVEL}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute SPRING_BOOT_AUTOCONFIG_LOG_LEVEL in backend manifest
        run: |
          sed -i "s|<SPRING_BOOT_AUTOCONFIG_LOG_LEVEL>|${SPRING_BOOT_AUTOCONFIG_LOG_LEVEL}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute SPRING_SHOW_REQUEST_DETAILS in backend manifest
        run: |
          sed -i "s|<SPRING_SHOW_REQUEST_DETAILS>|${SPRING_SHOW_REQUEST_DETAILS}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute SPRING_JPA_SHOW_SQL in backend manifest
        run: |
          sed -i "s|<SPRING_JPA_SHOW_SQL>|${SPRING_JPA_SHOW_SQL}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute TOKEN_ISSUER_URL in backend manifest
        run: |
          sed -i "s|<TOKEN_ISSUER_URL>|${TOKEN_ISSUER_URL}|g" \
            backend/openshift/deployment.yaml

      - name: Substitute SPRING_SHOW_REQUEST_DETAILS in backend manifest
        run: |
          sed -i "s|<SPRING_SHOW_REQUEST_DETAILS>|${SPRING_SHOW_REQUEST_DETAILS}|g" \
            backend/openshift/deployment.yaml

      - name: Apply backend manifests
        run: oc apply -f backend/openshift/deployment.yaml

      - name: Perform backend rollout
        run: |
          oc rollout restart deployment/rept-backend

      - name: Wait for backend rollout
        run: |
          oc rollout status deployment/rept-backend

      - name: Tag frontend image into OpenShift
        env:
          REGISTRY_PATH: ${{ needs.build-and-push-frontend.outputs.registry-path }}
        run: |
          oc tag --source=docker $REGISTRY_PATH ${{ env.APP_NAME }}-frontend:${{ env.IMAGE_TAG }} \
          --reference-policy=local

      - name: Substitute image in frontend manifest
        run: |
          sed -i "s|<IMAGE_PLACEHOLDER>|image-registry.openshift-image-registry.svc:5000/${OC_NAMESPACE}/${APP_NAME}-frontend:${IMAGE_TAG}|g" \
            frontend/openshift/deployment.yaml

      - name: Apply frontend manifests
        run: oc apply -f frontend/openshift/deployment.yaml

      - name: Perform frontend rollout
        run: |
          oc rollout restart deployment/rept-frontend

      - name: Wait for frontend rollout
        run: |
          oc rollout status deployment/rept-frontend

      - name: ZAP Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'https://${{ env.APP_NAME }}-${{ env.OC_NAMESPACE }}.apps.silver.devops.gov.bc.ca/v3/api-docs'
