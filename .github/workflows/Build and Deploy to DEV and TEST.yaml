name: Build & Deploy to OpenShift DEV & TEST

on:
  push:
    branches: [main]

env:
  # ── OpenShift / GHCR ──
  OPENSHIFT_URL:           ${{ vars.OC_SERVER }}       # https://api.<cluster>:6443
  OC_TOKEN:                ${{ secrets.OC_TOKEN }}     # service-account token with deploy rights
  OC_NAMESPACE:            ${{ secrets.OC_NAMESPACE }} # target namespace / project

  IMAGE_REGISTRY:          ghcr.io/${{ github.repository_owner }}
  IMAGE_REGISTRY_USER:     ${{ github.actor }}
  IMAGE_REGISTRY_PASSWORD: ${{ github.token }}
  IMAGE_TAG:               latest
  APP_NAME:                rept

  # ── Sizing / logging (non-secret deployment defaults) ──
  MIN_REPLICAS:                     1
  MAX_REPLICAS:                     2
  MIN_CPU:                          200m
  MIN_MEM:                          500Mi
  APP_LOG_LEVEL:                    INFO
  SPRING_SECURITY_LOG_LEVEL:        INFO
  SPRING_WEB_LOG_LEVEL:             INFO
  SPRING_BOOT_AUTOCONFIG_LOG_LEVEL: INFO
  SPRING_JPA_SHOW_SQL:              "false"
  FRONTEND_LOG_LEVEL:               INFO
  # In-cluster URL of the backend service. Caddy reverse_proxies /api* requests here.
  BACKEND_URL:                      http://rept-backend:8080

jobs:
  # https://github.com/redhat-actions/buildah-build#readme
  build-and-push-backend:
    name: Build Backend Image & Push
    runs-on: ubuntu-24.04
    outputs:
      registry-path: ${{ steps.push-image-backend.outputs.registry-path }}
    steps:
      - uses: actions/checkout@v6
      - name: Build Backend from Dockerfile
        id: build-image-backend
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}-backend
          tags: ${{ env.IMAGE_TAG }}
          context: ./backend
          dockerfiles: |
            ./backend/Dockerfile

      - name: Push backend to GHCR
        id: push-image-backend
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image-backend.outputs.image }}
          tags: ${{ steps.build-image-backend.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

  # ────────────────────────────────────────────────────────
  test-frontend:
    name: Lint & Test Frontend
    runs-on: ubuntu-24.04
    needs: build-and-push-backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run tests
        working-directory: ./frontend
        run: npm run test:unit -- --run --passWithNoTests

  # ────────────────────────────────────────────────────────
  build-and-push-frontend:
    name: Build Frontend Image & Push
    runs-on: ubuntu-24.04
    needs: test-frontend
    # Only push on merges to main (not PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    outputs:
      registry-path: ${{ steps.push-image-frontend.outputs.registry-path }}

    steps:
      - uses: actions/checkout@v6

      - name: Write .env.production from GitHub Actions secrets/vars
        # Baked into the image at build time as `import.meta.env.X`. The committed
        # frontend/.env.production is overwritten here so DEV/PROD share the same
        # source tree but get env-specific values per environment.
        env:
          VITE_USER_POOLS_ID:            ${{ vars.VITE_USER_POOLS_ID }}
          VITE_USER_POOLS_WEB_CLIENT_ID: ${{ vars.VITE_USER_POOLS_WEB_CLIENT_ID }}
          VITE_REDIRECT_SIGN_OUT:        ${{ vars.VITE_REDIRECT_SIGN_OUT }}
          VITE_BACKEND_URL:              ${{ vars.VITE_BACKEND_URL }}
          VITE_APP_NAME:                 ${{ vars.VITE_APP_NAME }}
          VITE_ZONE:                     ${{ vars.VITE_ZONE }}
        run: |
          cat > frontend/.env.production <<EOF
          VITE_BASE_PATH=/
          VITE_APP_NAME=${VITE_APP_NAME:-REPT}
          VITE_ZONE=${VITE_ZONE:-dev}
          VITE_USER_POOLS_ID=${VITE_USER_POOLS_ID}
          VITE_USER_POOLS_WEB_CLIENT_ID=${VITE_USER_POOLS_WEB_CLIENT_ID}
          VITE_REDIRECT_SIGN_OUT=${VITE_REDIRECT_SIGN_OUT}
          VITE_BACKEND_URL=${VITE_BACKEND_URL}
          EOF

      - name: Build Frontend from Dockerfile
        id: build-image-frontend
        uses: redhat-actions/buildah-build@v2
        with:
          image: ${{ env.APP_NAME }}-frontend
          tags: ${{ env.IMAGE_TAG }}
          context: ./frontend
          dockerfiles: |
            ./frontend/Dockerfile

      - name: Push frontend to GHCR
        id: push-image-frontend
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build-image-frontend.outputs.image }}
          tags: ${{ steps.build-image-frontend.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ env.IMAGE_REGISTRY_USER }}
          password: ${{ env.IMAGE_REGISTRY_PASSWORD }}

  # ────────────────────────────────────────────────────────
  deploy:
    name: Deploy to OpenShift DEV
    runs-on: ubuntu-24.04
    needs: [build-and-push-frontend, build-and-push-backend]
    environment: dev
    env:
      # OC_TOKEN and OC_NAMESPACE are per-environment; rebind at job level so the
      # `environment: dev` scope is in effect when the secrets are resolved
      # (workflow-level env can't see environment-scoped secrets).
      OC_TOKEN:                 ${{ secrets.OC_TOKEN }}
      OC_NAMESPACE:             ${{ secrets.OC_NAMESPACE }}
      # ── App config / credentials, scoped to deploy only ──
      AWS_COGNITO_ISSUER_URI:   ${{ vars.AWS_COGNITO_ISSUER_URI }}
      COGNITO_USERINFO_URI:     ${{ vars.COGNITO_USERINFO_URI }}
      IDENTITY_LOOKUP_BASE_URL: ${{ vars.IDENTITY_LOOKUP_BASE_URL }}
      DATABASE_HOST:            ${{ secrets.DATABASE_HOST }}
      DATABASE_SERVICE_NAME:    ${{ secrets.DATABASE_SERVICE_NAME }}
      DATABASE_USER:            ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD:        ${{ secrets.DATABASE_PASSWORD }}
      KEYSTORE_SECRET:          ${{ secrets.KEYSTORE_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift
        run: |
          oc login "$OPENSHIFT_URL" --token="$OC_TOKEN" --insecure-skip-tls-verify=false
          oc project "$OC_NAMESPACE"

      - name: Tag backend image into OpenShift
        env:
          REGISTRY_PATH_BACKEND: ${{ needs.build-and-push-backend.outputs.registry-path }}
        run: |
          oc tag --source=docker "$REGISTRY_PATH_BACKEND" "${APP_NAME}-backend:${IMAGE_TAG}" \
            --reference-policy=local

      - name: Render backend manifest with envsubst
        run: |
          mkdir -p /tmp/manifests
          export BACKEND_IMAGE="image-registry.openshift-image-registry.svc:5000/${OC_NAMESPACE}/${APP_NAME}-backend:${IMAGE_TAG}"
          envsubst '$BACKEND_IMAGE $MIN_REPLICAS $MAX_REPLICAS $MIN_CPU $MIN_MEM
                    $APP_LOG_LEVEL $SPRING_SECURITY_LOG_LEVEL $SPRING_WEB_LOG_LEVEL
                    $SPRING_BOOT_AUTOCONFIG_LOG_LEVEL $SPRING_JPA_SHOW_SQL
                    $AWS_COGNITO_ISSUER_URI $COGNITO_USERINFO_URI $IDENTITY_LOOKUP_BASE_URL
                    $DATABASE_HOST $DATABASE_SERVICE_NAME $DATABASE_USER $DATABASE_PASSWORD
                    $KEYSTORE_SECRET' \
            < backend/openshift/deployment.yaml \
            > /tmp/manifests/backend.yaml

      - name: Apply backend manifest
        run: oc apply -f /tmp/manifests/backend.yaml

      - name: Perform backend rollout
        run: oc rollout restart deployment/rept-backend

      - name: Wait for backend rollout
        run: oc rollout status deployment/rept-backend

      - name: Tag frontend image into OpenShift
        env:
          REGISTRY_PATH_FRONTEND: ${{ needs.build-and-push-frontend.outputs.registry-path }}
        run: |
          oc tag --source=docker "$REGISTRY_PATH_FRONTEND" "${APP_NAME}-frontend:${IMAGE_TAG}" \
            --reference-policy=local

      - name: Render frontend manifest with envsubst
        run: |
          mkdir -p /tmp/manifests
          export FRONTEND_IMAGE="image-registry.openshift-image-registry.svc:5000/${OC_NAMESPACE}/${APP_NAME}-frontend:${IMAGE_TAG}"
          export FRONTEND_HOST="${APP_NAME}-${OC_NAMESPACE}.apps.silver.devops.gov.bc.ca"
          envsubst '$FRONTEND_IMAGE $FRONTEND_LOG_LEVEL $BACKEND_URL $FRONTEND_HOST' \
            < frontend/openshift/deployment.yaml \
            > /tmp/manifests/frontend.yaml

      - name: Apply frontend manifest
        run: oc apply -f /tmp/manifests/frontend.yaml

      - name: Perform frontend rollout
        run: oc rollout restart deployment/rept-frontend

      - name: Wait for frontend rollout
        run: oc rollout status deployment/rept-frontend

      - name: ZAP Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          target: 'https://${{ env.APP_NAME }}-${{ env.OC_NAMESPACE }}.apps.silver.devops.gov.bc.ca/v3/api-docs'

  # ────────────────────────────────────────────────────────
  # Only runs when the DEV deploy above succeeds. Promotes the exact same
  # image tags into the TEST namespace on the same cluster.
  promote-to-test:
    name: Deploy to OpenShift TEST
    runs-on: ubuntu-24.04
    needs: [deploy, build-and-push-frontend, build-and-push-backend]
    environment: test
    env:
      # OC_TOKEN and OC_NAMESPACE are per-environment; rebind at job level so the
      # `environment: test` scope picks up the TEST cluster token + namespace secrets.
      OC_TOKEN:                 ${{ secrets.OC_TOKEN }}
      OC_NAMESPACE:             ${{ secrets.OC_NAMESPACE }}
      # App config / credentials, scoped to deploy only.
      AWS_COGNITO_ISSUER_URI:   ${{ vars.AWS_COGNITO_ISSUER_URI }}
      COGNITO_USERINFO_URI:     ${{ vars.COGNITO_USERINFO_URI }}
      IDENTITY_LOOKUP_BASE_URL: ${{ vars.IDENTITY_LOOKUP_BASE_URL }}
      DATABASE_HOST:            ${{ secrets.DATABASE_HOST }}
      DATABASE_SERVICE_NAME:    ${{ secrets.DATABASE_SERVICE_NAME }}
      DATABASE_USER:            ${{ secrets.DATABASE_USER }}
      DATABASE_PASSWORD:        ${{ secrets.DATABASE_PASSWORD }}
      KEYSTORE_SECRET:          ${{ secrets.KEYSTORE_SECRET }}

    steps:
      - uses: actions/checkout@v6

      - name: Install oc CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Log in to OpenShift (TEST)
        run: |
          oc login "$OPENSHIFT_URL" --token="$OC_TOKEN" --insecure-skip-tls-verify=false
          oc project "$OC_NAMESPACE"

      - name: Tag backend image into OpenShift (TEST)
        env:
          REGISTRY_PATH_BACKEND: ${{ needs.build-and-push-backend.outputs.registry-path }}
        run: |
          oc tag --source=docker "$REGISTRY_PATH_BACKEND" "${APP_NAME}-backend:${IMAGE_TAG}" \
            --reference-policy=local

      - name: Render backend manifest with envsubst
        run: |
          mkdir -p /tmp/manifests
          export BACKEND_IMAGE="image-registry.openshift-image-registry.svc:5000/${OC_NAMESPACE}/${APP_NAME}-backend:${IMAGE_TAG}"
          envsubst '$BACKEND_IMAGE $MIN_REPLICAS $MAX_REPLICAS $MIN_CPU $MIN_MEM
                    $APP_LOG_LEVEL $SPRING_SECURITY_LOG_LEVEL $SPRING_WEB_LOG_LEVEL
                    $SPRING_BOOT_AUTOCONFIG_LOG_LEVEL $SPRING_JPA_SHOW_SQL
                    $AWS_COGNITO_ISSUER_URI $COGNITO_USERINFO_URI $IDENTITY_LOOKUP_BASE_URL
                    $DATABASE_HOST $DATABASE_SERVICE_NAME $DATABASE_USER $DATABASE_PASSWORD
                    $KEYSTORE_SECRET' \
            < backend/openshift/deployment.yaml \
            > /tmp/manifests/backend.yaml

      - name: Apply backend manifest
        run: oc apply -f /tmp/manifests/backend.yaml

      - name: Perform backend rollout
        run: oc rollout restart deployment/rept-backend

      - name: Wait for backend rollout
        run: oc rollout status deployment/rept-backend

      - name: Tag frontend image into OpenShift (TEST)
        env:
          REGISTRY_PATH_FRONTEND: ${{ needs.build-and-push-frontend.outputs.registry-path }}
        run: |
          oc tag --source=docker "$REGISTRY_PATH_FRONTEND" "${APP_NAME}-frontend:${IMAGE_TAG}" \
            --reference-policy=local

      - name: Render frontend manifest with envsubst
        run: |
          mkdir -p /tmp/manifests
          export FRONTEND_IMAGE="image-registry.openshift-image-registry.svc:5000/${OC_NAMESPACE}/${APP_NAME}-frontend:${IMAGE_TAG}"
          export FRONTEND_HOST="${APP_NAME}-${OC_NAMESPACE}.apps.silver.devops.gov.bc.ca"
          envsubst '$FRONTEND_IMAGE $FRONTEND_LOG_LEVEL $BACKEND_URL $FRONTEND_HOST' \
            < frontend/openshift/deployment.yaml \
            > /tmp/manifests/frontend.yaml

      - name: Apply frontend manifest
        run: oc apply -f /tmp/manifests/frontend.yaml

      - name: Perform frontend rollout
        run: oc rollout restart deployment/rept-frontend

      - name: Wait for frontend rollout
        run: oc rollout status deployment/rept-frontend
