---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rept-backend
  labels:
    app: rept-backend
spec:
  replicas: ${MIN_REPLICAS}
  selector:
    matchLabels:
      app: rept-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  template:
    metadata:
      labels:
        app: rept-backend
      annotations:
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: '8080'
        prometheus.io/scrape: 'true'
    spec:
      initContainers:
        - name: rept-backend-init
          image: ghcr.io/bcgov/nr-forest-client/common:prod
          imagePullPolicy: Always
          env:
            - name: ORACLEDB_HOST
              value: ${DATABASE_HOST}
            - name: ORACLEDB_SECRET
              valueFrom:
                secretKeyRef:
                  name: rept-backend-secret
                  key: KEYSTORE_SECRET
            - name: ORACLEDB_PORT
              value: "1543"
          volumeMounts:
            - name: rept-backend-api-cert
              mountPath: /cert
          resources:
            requests:
              cpu: 200m
              memory: 300Mi
      containers:
        - name: rept-backend
          image: ${BACKEND_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # ── Spring profile + server ───────────────────────
            - name: SPRING_PROFILES_ACTIVE
              value: oracle
            - name: SERVER_PORT
              value: "8080"

            # ── Cognito / OAuth2 resource server ──────────────
            - name: AWS_COGNITO_ISSUER_URI
              value: ${AWS_COGNITO_ISSUER_URI}
            - name: COGNITO_USERINFO_URI
              value: ${COGNITO_USERINFO_URI}

            # ── Identity-lookup (IDIR user search) ────────────
            - name: IDENTITY_LOOKUP_BASE_URL
              value: ${IDENTITY_LOOKUP_BASE_URL}

            # ── Jasper / reporting ────────────────────────────
            - name: J_URL_FETCH
              value: ${J_URL_FETCH}
            - name: J_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rept-backend-secret
                  key: J_USERNAME
            - name: J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rept-backend-secret
                  key: J_PASSWORD

            # ── Oracle DB (consumed by application-oracle.yml) ─
            # application-oracle.yml builds the full TCPS TNS descriptor from these.
            - name: DATABASE_HOST
              value: ${DATABASE_HOST}
            - name: DATABASE_SERVICE_NAME
              value: ${DATABASE_SERVICE_NAME}
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: rept-backend-secret
                  key: DATABASE_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rept-backend-secret
                  key: DATABASE_PASSWORD

            # ── Logging ───────────────────────────────────────
            - name: APP_LOG_LEVEL
              value: ${APP_LOG_LEVEL}
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY
              value: ${SPRING_SECURITY_LOG_LEVEL}
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB
              value: ${SPRING_WEB_LOG_LEVEL}
            - name: LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_BOOT_AUTOCONFIGURE
              value: ${SPRING_BOOT_AUTOCONFIG_LOG_LEVEL}
            - name: SPRING_JPA_SHOW_SQL
              value: "${SPRING_JPA_SHOW_SQL}"

            # ── Keystore (for Oracle TLS cert mounted at /cert) ─
            - name: KEYSTORE_SECRET
              valueFrom:
                secretKeyRef:
                  name: rept-backend-secret
                  key: KEYSTORE_SECRET
          resources:
            requests:
              cpu: ${MIN_CPU}
              memory: ${MIN_MEM}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
            successThreshold: 1
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 20
            successThreshold: 1
          volumeMounts:
            - name: rept-backend-api-cert
              mountPath: /cert
            - name: tls-certs
              mountPath: "/etc/tls-certs"
              readOnly: true
            - name: log-storage
              mountPath: /logs
            - name: app-storage
              mountPath: /temp
      volumes:
        - name: tls-certs
          secret:
            secretName: rept-backend-cert
        - name: log-storage
          emptyDir: {}
        - name: app-storage
          emptyDir: {}
        - name: rept-backend-api-cert
          persistentVolumeClaim:
            claimName: rept-backend-api-cert
---
# Service
apiVersion: v1
kind: Service
metadata:
  name: rept-backend
  labels:
    app: rept-backend
  annotations:
    service.alpha.openshift.io/serving-cert-secret-name: rept-backend-cert
spec:
  selector:
    app: rept-backend
  ports:
    - name: 8080-tcp
      port: 8080
      protocol: TCP
---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rept-backend-cpu-autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rept-backend
  minReplicas: ${MIN_REPLICAS}
  maxReplicas: ${MAX_REPLICAS}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 200
---
# PVC for Keystore
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  labels:
    app: rept-backend
  name: rept-backend-api-cert
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Mi
  storageClassName: netapp-file-standard
---
# Secrets — all credentials live here, referenced via secretKeyRef above
apiVersion: v1
kind: Secret
metadata:
  name: rept-backend-secret
  labels:
    app: rept-backend
type: Opaque
stringData:
  DATABASE_USER: ${DATABASE_USER}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  J_USERNAME: ${J_USERNAME}
  J_PASSWORD: ${J_PASSWORD}
  KEYSTORE_SECRET: ${KEYSTORE_SECRET}
---
# NetworkPolicy: allow ingress into backend from
#   1) frontend pods (so Caddy's `reverse_proxy /api*` can reach :8080)
#   2) cluster monitoring (so Prometheus can scrape /actuator/prometheus)
# Without this, silver's default-deny ingress drops Caddy's outbound to
# rept-backend:8080 and the user sees 502 Bad Gateway on /api/* calls.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-frontend-and-monitoring-to-backend
spec:
  podSelector:
    matchLabels:
      app: rept-backend
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: rept-frontend
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: monitoring
  policyTypes:
    - Ingress
