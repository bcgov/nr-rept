spring:
  autoconfigure:
    # Re-enable datasource autoconfiguration for oracle profile
    # (overrides the DataSourceAutoConfiguration exclusion in application.yml)
    exclude: []

  # Standard Spring Boot datasource config.
  # TCPS (TLS) is mandatory on BC Gov silver — the DB listener exposes only port 1543
  # and requires the full Oracle Net Connect Descriptor (not the EZConnect form). The
  # host and service name come from env vars so the same template works across envs.
  datasource:
    url: "jdbc:oracle:thin:@(DESCRIPTION=(ADDRESS=(PROTOCOL=TCPS)(HOST=${DATABASE_HOST})(PORT=${DATABASE_PORT:1543}))(CONNECT_DATA=(SERVICE_NAME=${DATABASE_SERVICE_NAME})(SERVER=DEDICATED)))"
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      # Truststore for TCPS handshake. In the cluster, the init container
      # (bcgov/nr-forest-client/common) writes a JKS truststore to /cert/jssecacerts
      # using KEYSTORE_SECRET as the password — that's the production default. For
      # local dev, copy the file out of a running pod and set TRUSTSTORE_PATH to
      # its absolute path on your machine:
      #   oc cp $(oc get pod -l app=rept-backend -o name | head -1 | cut -d/ -f2):/cert/jssecacerts ./jssecacerts
      #   export TRUSTSTORE_PATH=$(pwd)/jssecacerts
      data-source-properties:
        javax.net.ssl.trustStoreType: JKS
        javax.net.ssl.trustStore: ${TRUSTSTORE_PATH:/cert/jssecacerts}
        javax.net.ssl.trustStorePassword: ${KEYSTORE_SECRET}

  jpa:
    properties:
      hibernate:
        # Dialect is auto-detected from the Oracle JDBC connection in
        # Hibernate 6 — setting it explicitly produces HHH90000025.
        format_sql: false
